name: Backport PR

on:
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      pr:
        description: Pull Request number
        required: true
      target_branch:
        description: Branch to where backport the PR
        required: true

permissions:
  issues: write
  pull-requests: read

jobs:
  backport:
    if: >-
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'backport:release')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Backport
    steps:
      - name: Create backport task for Copilot agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
        run: |
          CONFLICT_GUIDANCE="
          ## Conflict resolution
          If the cherry-pick produces merge conflicts, resolve them as follows:
          - Prefer the incoming change (from the PR being backported) when it is a pure bug fix
            or a self-contained feature with no dependencies on master-only APIs.
          - When the conflict is caused by a refactor or API change that only exists on master,
            adapt the backported code to use the equivalent API available on the target branch
            so the result compiles and the existing tests pass.
          - Do NOT resolve conflicts by simply accepting the target-branch side and dropping the
            fix — the goal is to land the intended change on the release branch.

          ## ABI/API safety rules
          When resolving conflicts or adapting code, strictly follow these rules to avoid
          breaking the stable release branch:
          - Do NOT change the signature, return type, or parameter order of any existing
            public C, C++, or Fortran API functions or classes.
          - Do NOT add, remove, or reorder fields in any public struct or class that is part
            of the ABI-stable interface (e.g., anything in \`bindings/\`, \`source/adios2/core/\`,
            or installed public headers).
          - Do NOT change the size or layout of any existing public type.
          - New symbols may be added only if they are purely additive and do not alter the
            layout of existing types.
          - If the backport cannot be cleanly adapted without breaking ABI/API, leave a comment
            in the pull request explaining why and request a human review before merging."

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TITLE="Backport PR #${PR_NUMBER} to release branch"
            BODY="Please backport PR #${PR_NUMBER} (\"${PR_TITLE}\") to the latest release branch.

          ## Steps
          1. Find the merge commit for PR #${PR_NUMBER} in the ornladios/ADIOS2 repository
          2. Identify the latest release branch by listing branches matching the pattern \`release_*\`
             and selecting the one with the highest version number (e.g., release_211)
          3. Cherry-pick the merge commit onto the release branch
          4. Push the changes to a branch in the ornladios-robot/ADIOS2 fork
             named \`backport-to-<release_branch>-${PR_NUMBER}\`
          5. Open a pull request from ornladios-robot/ADIOS2 targeting the release branch
             in ornladios/ADIOS2 with title \"Backport ${PR_NUMBER} to <release_branch>\"
          ${CONFLICT_GUIDANCE}"
          else
            PR_TITLE=$(gh pr view "${PR_NUMBER}" --repo ornladios/ADIOS2 --json title --jq '.title')
            TITLE="Backport PR #${PR_NUMBER} to ${TARGET_BRANCH}"
            BODY="Please backport PR #${PR_NUMBER} (\"${PR_TITLE}\") to branch \`${TARGET_BRANCH}\`.

          ## Steps
          1. Find the merge commit for PR #${PR_NUMBER} in the ornladios/ADIOS2 repository
          2. Cherry-pick the merge commit onto \`${TARGET_BRANCH}\`
          3. Push the changes to a branch in the ornladios-robot/ADIOS2 fork
             named \`backport-to-${TARGET_BRANCH}-${PR_NUMBER}\`
          4. Open a pull request from ornladios-robot/ADIOS2 targeting \`${TARGET_BRANCH}\`
             in ornladios/ADIOS2 with title \"Backport ${PR_NUMBER} to ${TARGET_BRANCH}\"
          ${CONFLICT_GUIDANCE}"
          fi
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --assignee "copilot"
