name: REUSE Compliance

on:
  push:
    branches:
      - master
      - 'release*'
  pull_request:
    branches:
      - master
      - 'release*'
jobs:
  reuse:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Check REUSE compliance
        run: pipx run reuse lint
