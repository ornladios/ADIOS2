name: REUSE Compliance

on:
  push:
    branches:
      - master
      - 'release*'
  pull_request:
    branches:
      - master
      - 'release*'
permissions:
  contents: read

jobs:
  reuse:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check REUSE compliance
        run: pipx run reuse lint
