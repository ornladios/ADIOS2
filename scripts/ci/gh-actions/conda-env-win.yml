name: adios2
variables:
  CMAKE_PREFIX_PATH: "C:/Miniconda/envs/adios2/Library;$CMAKE_PREFIX_PATH"
dependencies:
  - c-blosc2
  - hdf5
  - mpi4py
  - msmpi
  - numpy >=1.19,<=2.3.4 # 2.3.5 makes `import numpy` to fail mysteriously
  - python >=3.8,<=3.13
  - zlib
